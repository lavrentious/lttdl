# sample nginx config for lttdl file sharing
#
# two modes are supported — pick one:
#
#   proxy mode  (FILE_SHARE_SERVER_MODE=proxy):
#     nginx serves the shared directory directly.
#     fastest option; no extra port needed.
#
#   builtin mode (FILE_SHARE_SERVER_MODE=builtin):
#     the bot runs its own http server on FILE_SHARE_SERVER_PORT.
#     nginx acts as a reverse proxy in front of it.

server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem; // consider certbot
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # -----------------------------------------------------------------
    # proxy mode: nginx serves the shared directory directly
    # FILE_SHARE_BASE_URL=https://example.com/files
    # FILE_SHARE_SERVER_MODE=proxy
    # -----------------------------------------------------------------
    location /files/ {
        alias /opt/lttdl/shared/;
        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff";
        expires 1h;
    }

    # -----------------------------------------------------------------
    # builtin mode: proxy to the bot's built-in http server
    # FILE_SHARE_BASE_URL=https://example.com/files
    # FILE_SHARE_SERVER_MODE=builtin
    # FILE_SHARE_SERVER_PORT=3000
    # (comment out the proxy mode block above and uncomment this one)
    # -----------------------------------------------------------------
    # location /files/ {
    #     proxy_pass http://127.0.0.1:3000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
